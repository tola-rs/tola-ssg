# Build and release tola binaries for all platforms
# Triggered on version tags (v*) or manually via workflow_dispatch
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (required, e.g. v0.7.0, v0.7.0-pre.1)."
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            archive: tar.gz
            binary: tola
            use_cachix: true
          - target: x86_64-linux-static
            archive: tar.gz
            binary: tola
            use_cachix: true
          - target: aarch64-linux
            archive: tar.gz
            binary: tola
            use_cachix: true
          - target: aarch64-linux-static
            archive: tar.gz
            binary: tola
            use_cachix: true
          - target: aarch64-darwin
            archive: tar.gz
            binary: tola
            use_cachix: true
          - target: x86_64-windows
            archive: zip
            binary: tola.exe
            use_cachix: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # Install Nix
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Enable Cachix only for Linux/macOS targets
      - uses: cachix/cachix-action@v15
        if: ${{ matrix.use_cachix }}
        with:
          name: tola
          signingKey: '${{ secrets.CACHIX_SIGNING_KEY }}'
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build and package
        run: |
          set -euo pipefail
          mkdir -p artifacts

          echo "Building ${TARGET}..."
          outpath=$(nix build -j auto --no-link --print-out-paths "./#${TARGET}")

          if [ "${ARCHIVE}" = "zip" ]; then
            (cd "$outpath/bin" && zip -9 "$OLDPWD/artifacts/tola-${TARGET}.zip" "${BINARY}")
          else
            tar -czvf "artifacts/tola-${TARGET}.tar.gz" -C "$outpath/bin" "${BINARY}"
          fi
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
          BINARY: ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Required for changelog generation

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          merge-multiple: true
          path: artifacts

      - name: Create or update release
        run: |
          set -euo pipefail

          tag="${DISPATCH_TAG:-}"
          if [ -z "$tag" ]; then
            tag="${GITHUB_REF_NAME}"
          fi

          # Basic validation for release tag format
          if ! echo "$tag" | grep -qE '^v[0-9A-Za-z._-]+$'; then
            echo "Invalid release tag: $tag"
            echo "Expected format like v0.7.0 or v0.7.0-pre.1"
            exit 1
          fi

          # Generate SHA256 checksums
          cd artifacts
          sha256sum * > checksums.txt
          cd ..

          # Generate categorized release notes from commits since last tag
          prev_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$prev_tag" ]; then
            echo "## What's Changed" > notes.md
            echo "" >> notes.md

            # Collect commits
            commits=$(git log --pretty=format:"%s" "$prev_tag"..HEAD)

            # Features (feat:)
            features=$(echo "$commits" | grep -iE '^feat(\(.+\))?:' | sed 's/^feat\([^)]*\)\?: //' || true)
            if [ -n "$features" ]; then
              echo "### ■ Features" >> notes.md
              echo "$features" | while read -r line; do
                [ -n "$line" ] && echo "- $line" >> notes.md
              done
              echo "" >> notes.md
            fi

            # Fixes (fix:)
            fixes=$(echo "$commits" | grep -iE '^fix(\(.+\))?:' | sed 's/^fix\([^)]*\)\?: //' || true)
            if [ -n "$fixes" ]; then
              echo "### ■ Bug Fixes" >> notes.md
              echo "$fixes" | while read -r line; do
                [ -n "$line" ] && echo "- $line" >> notes.md
              done
              echo "" >> notes.md
            fi

            # Refactor (refactor:)
            refactors=$(echo "$commits" | grep -iE '^refactor(\(.+\))?:' | sed 's/^refactor\([^)]*\)\?: //' || true)
            if [ -n "$refactors" ]; then
              echo "### ■ Refactor" >> notes.md
              echo "$refactors" | while read -r line; do
                [ -n "$line" ] && echo "- $line" >> notes.md
              done
              echo "" >> notes.md
            fi

            # Performance (perf:)
            perfs=$(echo "$commits" | grep -iE '^perf(\(.+\))?:' | sed 's/^perf\([^)]*\)\?: //' || true)
            if [ -n "$perfs" ]; then
              echo "### ■ Performance" >> notes.md
              echo "$perfs" | while read -r line; do
                [ -n "$line" ] && echo "- $line" >> notes.md
              done
              echo "" >> notes.md
            fi

            # Other commits (exclude release, ci, chore, docs, build, style, test)
            others=$(echo "$commits" | grep -viE '^(feat|fix|refactor|perf|release|ci|chore|docs|build|style|test)(\(.+\))?:' | grep -viE '^release ' || true)
            if [ -n "$others" ]; then
              echo "### ■ Other Changes" >> notes.md
              echo "$others" | while read -r line; do
                [ -n "$line" ] && echo "- $line" >> notes.md
              done
              echo "" >> notes.md
            fi

            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$prev_tag...$tag" >> notes.md
          else
            # Fallback to commit message if no previous tag
            git log -1 --format="%B" > notes.md
          fi

          # Check if this is a prerelease (contains -alpha, -beta, -rc, etc.)
          prerelease_flag=""
          if echo "$tag" | grep -qE '\-(alpha|beta|rc|dev|pre)'; then
            prerelease_flag="--prerelease"
          fi

          # Upsert release to avoid delete->create failure window
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/* --clobber
            gh release edit "$tag" \
              --title "$tag" \
              --notes-file notes.md \
              $prerelease_flag
          else
            gh release create "$tag" artifacts/* \
              --target "${GITHUB_SHA}" \
              --title "$tag" \
              --notes-file notes.md \
              $prerelease_flag
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_TAG: ${{ github.event.inputs.tag || '' }}
