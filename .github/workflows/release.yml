# Build and release tola binaries for all platforms
# Triggered on version tags (v*) or manually via workflow_dispatch
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (required, e.g. v0.7.0, v0.7.0-pre.1)."
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-static
            archive: tar.gz
            binary: tola
            use_cachix: true
          - target: aarch64-linux-static
            archive: tar.gz
            binary: tola
            use_cachix: true
          - target: aarch64-darwin
            archive: tar.gz
            binary: tola
            use_cachix: true
          - target: x86_64-windows
            archive: zip
            binary: tola.exe
            use_cachix: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          # Build the exact release tag, including manual dispatches from another branch
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Install Nix
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Enable Cachix only for Linux/macOS targets
      - uses: cachix/cachix-action@v15
        if: ${{ matrix.use_cachix }}
        with:
          name: tola
          signingKey: '${{ secrets.CACHIX_SIGNING_KEY }}'
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build and package
        run: |
          set -euo pipefail
          mkdir -p artifacts

          echo "Building ${TARGET}..."
          outpath=$(nix build -j auto --no-link --print-out-paths "./#${TARGET}")

          if [ "${ARCHIVE}" = "zip" ]; then
            (cd "$outpath/bin" && zip -9 "$OLDPWD/artifacts/tola-${TARGET}.zip" "${BINARY}")
          else
            tar -czvf "artifacts/tola-${TARGET}.tar.gz" -C "$outpath/bin" "${BINARY}"
          fi
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
          BINARY: ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Required for changelog generation
          # Generate notes from the release tag, not from the workflow trigger commit
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Checkout workflow scripts
        uses: actions/checkout@v5
        with:
          # Use the workflow revision for scripts when rerunning an older tag
          ref: ${{ github.workflow_sha }}
          path: workflow-source

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          merge-multiple: true
          path: artifacts

      - name: Create or update release
        run: |
          set -euo pipefail

          tag="${DISPATCH_TAG:-}"
          if [ -z "$tag" ]; then
            tag="${GITHUB_REF_NAME}"
          fi

          # Basic validation for release tag format
          if ! echo "$tag" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Invalid release tag: $tag"
            echo "Expected format like v0.7.0 or v0.7.0-pre.1"
            exit 1
          fi

          # Generate SHA256 checksums
          cd artifacts
          sha256sum * > checksums.txt
          cd ..

          # Refuse to publish releases for tags that are missing or mistyped
          git rev-parse --verify "$tag^{commit}" >/dev/null

          python3 workflow-source/.github/scripts/release_notes.py \
            --repo . \
            --tag "$tag" \
            --repository "${GITHUB_REPOSITORY}" \
            --output notes.md

          prerelease_args=()
          if echo "$tag" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-'; then
            prerelease_args=(--prerelease)
          fi

          # Upsert release to avoid delete->create failure window
          if gh release view "$tag" >/dev/null 2>&1; then
            existing_assets=$(gh release view "$tag" --json assets --jq '.assets[].name')
            for stale_asset in \
              "tola-x86_64-linux.tar.gz" \
              "tola-aarch64-linux.tar.gz"; do
              if echo "$existing_assets" | grep -Fxq "$stale_asset"; then
                gh release delete-asset "$tag" "$stale_asset" --yes
              fi
            done

            gh release upload "$tag" artifacts/* --clobber
            gh release edit "$tag" \
              --title "$tag" \
              --notes-file notes.md \
              "${prerelease_args[@]}"
          else
            # Do not let gh create a release tag from the default branch
            gh release create "$tag" artifacts/* \
              --verify-tag \
              --title "$tag" \
              --notes-file notes.md \
              "${prerelease_args[@]}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_TAG: ${{ github.event.inputs.tag || '' }}
